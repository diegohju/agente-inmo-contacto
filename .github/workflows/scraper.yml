name: 🏠 Agente Inmobiliario — Scraper Diario

on:
  schedule:
    # Todos los días a las 8:00 AM (hora Chile, UTC-3 → 11:00 UTC)
    - cron: "0 11 * * *"
  workflow_dispatch:   # Permite ejecutarlo manualmente desde GitHub
    inputs:
      max_paginas:
        description: "Número de páginas a scrapear"
        required: false
        default: "10"
      buscar_emails:
        description: "Activar email lookup (true/false)"
        required: false
        default: "true"

jobs:
  scraper:
    name: Ejecutar scraper
    runs-on: ubuntu-latest
    timeout-minutes: 60       # máximo 1 hora por ejecución

    steps:
      # ── 1. Checkout del código ────────────────────────────
      - name: 📥 Checkout
        uses: actions/checkout@v4

      # ── 2. Python 3.11 ───────────────────────────────────
      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scraper/requirements.txt

      # ── 3. Google Chrome ─────────────────────────────────
      - name: 🌐 Instalar Google Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google.list'
          sudo apt-get update -qq
          sudo apt-get install -y google-chrome-stable
          google-chrome --version

      # ── 4. ChromeDriver coincidente ──────────────────────
      - name: 🔧 Instalar ChromeDriver
        run: |
          CHROME_VER=$(google-chrome --version | awk '{print $3}' | cut -d. -f1)
          DRIVER_URL="https://storage.googleapis.com/chrome-for-testing-public/${CHROME_VER}.0.0.0/linux64/chromedriver-linux64.zip"
          wget -q "$DRIVER_URL" -O chromedriver.zip || true
          # Fallback: webdriver-manager se encarga si falla la descarga directa
          if [ -f chromedriver.zip ]; then
            unzip -q chromedriver.zip
            sudo mv chromedriver-linux64/chromedriver /usr/bin/chromedriver
            sudo chmod +x /usr/bin/chromedriver
          fi
          chromedriver --version || echo "ChromeDriver gestionado por webdriver-manager"

      # ── 5. Dependencias Python ───────────────────────────
      - name: 📦 Instalar dependencias
        working-directory: scraper
        run: pip install -r requirements.txt

      # ── 6. Ejecutar el scraper ───────────────────────────
      - name: 🚀 Ejecutar agente scraper
        working-directory: scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          MAX_PAGINAS: ${{ github.event.inputs.max_paginas || '10' }}
          BUSCAR_EMAILS: ${{ github.event.inputs.buscar_emails || 'true' }}
        run: python scraper_portal_inmobiliario.py

      # ── 7. Notificación de resultado ─────────────────────
      - name: ✅ Resumen de ejecución
        if: always()
        run: |
          echo "### 🏠 Agente Inmobiliario" >> $GITHUB_STEP_SUMMARY
          echo "- **Fecha:** $(date '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- **Páginas:** ${{ github.event.inputs.max_paginas || '10' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Email lookup:** ${{ github.event.inputs.buscar_emails || 'true' }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" = "success" ]; then
            echo "- **Estado:** ✅ Completado" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Estado:** ❌ Error — revisar logs" >> $GITHUB_STEP_SUMMARY
          fi
