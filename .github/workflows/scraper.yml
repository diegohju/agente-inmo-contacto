name: 🏠 Agente Inmobiliario — Scraper Diario

on:
  schedule:
    # Todos los días a las 8:00 AM (hora Chile, UTC-3 → 11:00 UTC)
    - cron: "0 11 * * *"
  workflow_dispatch:   # Permite ejecutarlo manualmente desde GitHub
    inputs:
      max_paginas:
        description: "Número de páginas a scrapear"
        required: false
        default: "10"
      buscar_emails:
        description: "Activar email lookup (true/false)"
        required: false
        default: "true"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Evita la advertencia de Node.js 20

jobs:
  scraper:
    name: Ejecutar scraper
    runs-on: ubuntu-latest
    timeout-minutes: 60       # máximo 1 hora por ejecución

    steps:
      # ── 1. Checkout del código ────────────────────────────
      - name: 📥 Checkout
        uses: actions/checkout@v4

      # ── 2. Python 3.11 ───────────────────────────────────
      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scraper/requirements.txt

      # ── 3. Verificar que los Secrets están cargados ──────
      - name: 🔑 Verificar Secrets de Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ]; then
            echo "❌ ERROR: El Secret 'SUPABASE_URL' no está configurado en GitHub."
            echo "Ve a: Settings → Secrets and variables → Actions → New repository secret"
            exit 1
          else
            echo "✅ SUPABASE_URL cargada correctamente (${#SUPABASE_URL} caracteres)"
          fi
          if [ -z "$SUPABASE_SERVICE_KEY" ]; then
            echo "❌ ERROR: El Secret 'SUPABASE_SERVICE_KEY' no está configurado en GitHub."
            exit 1
          else
            echo "✅ SUPABASE_SERVICE_KEY cargada correctamente (${#SUPABASE_SERVICE_KEY} caracteres)"
          fi

      # ── 4. Google Chrome + ChromeDriver ─────────────────
      - name: 🌐 Instalar Google Chrome y ChromeDriver
        run: |
          # Instalar Chrome
          sudo apt-get update -qq
          sudo apt-get install -y google-chrome-stable
          CHROME_VER=$(google-chrome --version | grep -oP '\d+\.\d+\.\d+\.\d+')
          echo "Chrome version: $CHROME_VER"

          # Instalar ChromeDriver que coincida con Chrome instalado
          # selenium-manager (incluido en Selenium 4.6+) lo descarga automáticamente
          # pero también instalamos desde sistema como fallback
          CHROME_MAJOR=$(echo $CHROME_VER | cut -d. -f1)
          echo "Chrome major: $CHROME_MAJOR"

          # Descargar chromedriver desde el nuevo endpoint de Google (Chrome 115+)
          DRIVER_URL=$(curl -s "https://googlechromelabs.github.io/chrome-for-testing/known-good-versions-with-downloads.json" \
            | python3 -c "
import sys, json
data = json.load(sys.stdin)
major = '$CHROME_MAJOR'
for v in reversed(data['versions']):
    if v['version'].split('.')[0] == major:
        for d in v.get('downloads', {}).get('chromedriver', []):
            if d['platform'] == 'linux64':
                print(d['url'])
                break
        break
" 2>/dev/null || echo "")

          if [ -n "$DRIVER_URL" ]; then
            echo "Descargando chromedriver desde: $DRIVER_URL"
            wget -q "$DRIVER_URL" -O /tmp/chromedriver.zip
            unzip -q /tmp/chromedriver.zip -d /tmp/chromedriver_extracted/
            sudo mv /tmp/chromedriver_extracted/chromedriver-linux64/chromedriver /usr/local/bin/chromedriver
            sudo chmod +x /usr/local/bin/chromedriver
            chromedriver --version
          else
            echo "No se pudo descargar chromedriver — selenium-manager lo gestionará"
          fi

      # ── 5. Dependencias Python ───────────────────────────
      - name: 📦 Instalar dependencias
        working-directory: scraper
        run: pip install -r requirements.txt

      # ── 6. Ejecutar el scraper ───────────────────────────
      - name: 🚀 Ejecutar agente scraper
        working-directory: scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          MAX_PAGINAS: ${{ github.event.inputs.max_paginas || '10' }}
          BUSCAR_EMAILS: ${{ github.event.inputs.buscar_emails || 'true' }}
        run: python scraper_portal_inmobiliario.py

      # ── 7. Notificación de resultado ─────────────────────
      - name: ✅ Resumen de ejecución
        if: always()
        run: |
          echo "### 🏠 Agente Inmobiliario" >> $GITHUB_STEP_SUMMARY
          echo "- **Fecha:** $(date '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- **Páginas:** ${{ github.event.inputs.max_paginas || '10' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Email lookup:** ${{ github.event.inputs.buscar_emails || 'true' }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" = "success" ]; then
            echo "- **Estado:** ✅ Completado" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Estado:** ❌ Error — revisar logs" >> $GITHUB_STEP_SUMMARY
          fi
